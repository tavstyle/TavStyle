<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavStyle | Fragrances</title>

    <!-- Fuente Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <!-- Iconos -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header>

    <nav class="navbar">

        <a href="index.html" class="logo">

            <img src="assets/logo/TavStyleLogoBlancoPNG.png" alt="TavStyle Logo">

            <h2>TavStyle</h2>

        </a>

        <div class="search">

            <input
            type="text"
            placeholder="Buscar perfume...">

        </div>

        <div class="cart">

            <i class="fa-solid fa-cart-shopping"></i>

            <span>0</span>

        </div>

        <button class="menu-btn">

            <i class="fa-solid fa-bars"></i>

        </button>

    </nav>

    <section class="hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <h1>TAVSTYLE</h1>

        <p class="hero-subtitle">
            Descubre tu próxima fragancia...
        </p>

        <p class="hero-text">
            Perfumes 1:1 para Dama y Caballero.
            Elegancia, calidad y estilo en cada aroma.
        </p>

        <a href="#catalogo" class="hero-btn">
            Explorar Catálogo
        </a>

    </div>

</section>

</header>

    </li>

        </a>
    </li>

        </a>

        <a href="#">

        </a>
    </li>


    <li>
        <a href="#">
            Unisex
        </a>
    </li>


    <li>
        <a href="#">
            Contacto
        </a>
    </li>


</ul>
